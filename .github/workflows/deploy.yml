name: 构建并部署到 GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install Pillow

      - name: 生成缩略图和照片清单
        run: python build.py

      - name: 组装站点文件
        run: |
          mkdir dist
          cp index.html photos.js dist/
          cp -r photos dist/photos
          if [ -d thumbs ]; then cp -r thumbs dist/thumbs; fi
          if [ -d originals ]; then cp -r originals dist/originals; fi

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
